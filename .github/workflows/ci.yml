name: CI — Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: mathe
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: flowline
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Grant execute permission to Gradle
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew test --info 2>&1 | tail -200
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5433/flowline
          SPRING_DATASOURCE_USERNAME: mathe
          SPRING_DATASOURCE_PASSWORD: testpassword
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          JWT_SECRET: flowline-secret-key-must-be-at-least-256-bits-long-for-hs256
          JWT_EXPIRATION: 86400000
          SPRING_PROFILES_ACTIVE: test