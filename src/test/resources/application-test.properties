spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;NON_KEYWORDS=value
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false
spring.ai.anthropic.api-key=test-fake-key
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.anthropic.AnthropicAutoConfiguration
jwt.secret=flowline-secret-key-must-be-at-least-256-bits-long-for-hs256
jwt.expiration=86400000